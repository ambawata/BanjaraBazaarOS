<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vastu Griha — Studio v4</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{
  --orange:#E08A3C; --orange-dark:#C96F24; --orange-dim:rgba(224,138,60,.14);
  --ink:#3A2E22; --ink-soft:#8A7A5C; --ink-faint:#B3A78F;
  --card:#FFFFFF; --line:#EEE4D2;
  --danger:#C24545; --success:#3D8B5F; --amber:#C08A1E;
  --fh:'Poppins',sans-serif; --fb:'Inter',sans-serif; --fm:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--fb);color:var(--ink);
  background:radial-gradient(circle at 1px 1px, #E3D8C2 1px, transparent 0) 0 0/24px 24px, #EFE8D8;}

/* ============ full-bleed canvas ============ */
#cv{position:fixed;inset:0;width:100%;height:100%;touch-action:none;user-select:none;cursor:grab;}
#cv.panning{cursor:grabbing;}
svg text{user-select:none;pointer-events:none;}

/* ============ floating top bar — draggable, can be parked anywhere ============ */
.bar{position:fixed;top:12px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:16px;
  padding:7px 10px;box-shadow:0 10px 34px rgba(58,46,34,.14);z-index:40;max-width:calc(100vw - 24px);overflow-x:auto;scrollbar-width:none;}
.bar::-webkit-scrollbar{display:none;}
.bar.dragging{opacity:.92;box-shadow:0 16px 44px rgba(58,46,34,.26);transition:none;}
.logo{width:28px;height:28px;border-radius:9px;background:linear-gradient(135deg,var(--orange),#D97B26);display:grid;place-items:center;font-family:var(--fh);font-weight:800;font-size:11px;color:#fff;flex:0 0 auto;cursor:grab;touch-action:none;}
.logo:active{cursor:grabbing;}
.bseg{display:flex;align-items:center;gap:5px;padding:0 7px;border-left:1px solid var(--line);flex:0 0 auto;}
.bseg:first-of-type{border-left:none;}
.bseg label{font-size:8.5px;font-weight:800;color:var(--ink-faint);letter-spacing:.08em;text-transform:uppercase;}
.bseg input[type=text]{width:104px;border:none;background:none;font-size:12px;font-weight:700;font-family:var(--fh);color:var(--ink);}
.bseg input[type=number]{width:40px;border:1px solid var(--line);border-radius:7px;padding:4px 4px;font-family:var(--fm);font-size:11px;background:#FBF7EE;color:var(--ink);}
.bseg select{border:1px solid var(--line);border-radius:7px;padding:4px 4px;font-size:10.5px;font-weight:600;background:#FBF7EE;color:var(--ink);}
.bseg input:focus,.bseg select:focus{outline:2px solid var(--orange-dim);}
.hbtn{width:30px;height:30px;border-radius:9px;border:1px solid var(--line);background:#FBF7EE;color:var(--ink);font-size:13px;cursor:pointer;transition:all .13s;flex:0 0 auto;display:grid;place-items:center;}
.hbtn:hover:not(:disabled){border-color:var(--orange);color:var(--orange-dark);}
.hbtn:active:not(:disabled){transform:scale(.9);}
.hbtn:disabled{opacity:.32;cursor:default;}
.ring{position:relative;width:34px;height:34px;flex:0 0 auto;}
.ring svg{transform:rotate(-90deg);}
.ring .v{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--fh);font-weight:800;font-size:10.5px;}

/* ============ zoom controls ============ */
.zoomer{position:fixed;right:14px;bottom:96px;display:flex;flex-direction:column;gap:5px;z-index:40;}
.zbtn{width:36px;height:36px;border-radius:11px;border:1px solid var(--line);background:rgba(255,255,255,.94);backdrop-filter:blur(10px);
  color:var(--ink);font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(58,46,34,.12);transition:all .15s;}
.zbtn:hover{border-color:var(--orange);color:var(--orange-dark);}
.zbtn:active{transform:scale(.9);}

/* ============ bottom dock ============ */
.dock{position:fixed;left:50%;transform:translateX(-50%);bottom:12px;z-index:40;
  background:rgba(255,255,255,.94);backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:18px;
  padding:8px;box-shadow:0 12px 40px rgba(58,46,34,.16);max-width:calc(100vw - 24px);}
.dock .chips{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;}
.dock .chips::-webkit-scrollbar{display:none;}
.chip{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:3px;background:#FBF7EE;border:1.5px solid transparent;
  border-radius:12px;padding:7px 11px;cursor:pointer;transition:all .15s;min-width:58px;}
.chip:hover{border-color:var(--orange);background:#FFF;}
.chip:active{transform:scale(.9);}
.chip .e{font-size:17px;line-height:1;}
.chip span{font-size:8.5px;font-weight:700;font-family:var(--fh);color:var(--ink);white-space:nowrap;}

/* ============ floating selection card ============ */
.sel{position:fixed;right:14px;top:64px;width:246px;max-height:calc(100vh - 180px);overflow-y:auto;z-index:45;
  background:rgba(255,255,255,.96);backdrop-filter:blur(14px);border:1px solid var(--line);border-radius:18px;
  padding:14px;box-shadow:0 16px 50px rgba(58,46,34,.2);transform:translateX(280px);transition:transform .3s cubic-bezier(.22,1,.36,1);scrollbar-width:thin;}
.sel.open{transform:none;}
.sel h3{font-family:var(--fh);font-size:12.5px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.sel h3 .close{margin-left:auto;width:22px;height:22px;border-radius:7px;border:none;background:#F3ECDD;cursor:pointer;font-size:10px;font-weight:700;color:var(--ink-soft);}
.sel h3 .close:hover{background:var(--orange-dim);color:var(--orange-dark);}
.frow{display:flex;gap:6px;margin-bottom:8px;align-items:center;}
.frow label{font-size:8.5px;font-weight:800;color:var(--ink-faint);width:50px;flex:0 0 auto;text-transform:uppercase;letter-spacing:.06em;}
.frow input[type=number]{width:56px;border:1px solid var(--line);border-radius:7px;padding:5px;font-family:var(--fm);font-size:11px;background:#FBF7EE;}
.frow input[type=text]{flex:1;border:1px solid var(--line);border-radius:7px;padding:5px 7px;font-size:11px;font-weight:600;background:#FBF7EE;}
.btnrow{display:flex;gap:5px;flex-wrap:wrap;margin:2px 0 4px;}
.btn{border:1px solid var(--line);background:#FBF7EE;border-radius:9px;padding:6px 9px;font-size:9.5px;font-weight:700;cursor:pointer;font-family:var(--fb);color:var(--ink);transition:all .13s;}
.btn:hover{border-color:var(--orange);color:var(--orange-dark);}
.btn:active{transform:scale(.92);}
.btn.danger:hover{border-color:var(--danger);color:var(--danger);}
.btn.on{background:var(--orange-dim);border-color:var(--orange);color:var(--orange-dark);}
.openrow{display:flex;align-items:center;gap:4px;font-size:9.5px;background:#FBF7EE;border-radius:8px;padding:4px 6px;margin-top:4px;}
.openrow b{font-family:var(--fh);flex:1;font-size:9px;}
.openrow select{border:1px solid var(--line);border-radius:5px;font-size:8.5px;padding:2px;background:#fff;}
.openrow input[type=range]{width:44px;accent-color:var(--orange);}
.openrow button{border:none;background:none;cursor:pointer;font-size:8.5px;font-weight:700;color:var(--orange-dark);padding:2px 4px;border-radius:5px;}
.openrow button:hover{background:var(--orange-dim);}
.openrow button.del{color:var(--danger);}
.verd{border-top:1px dashed var(--line);margin-top:10px;padding-top:10px;}
.vbadge{display:inline-block;font-family:var(--fh);font-size:9.5px;font-weight:700;padding:5px 10px;border-radius:99px;margin-bottom:8px;}
.vbadge.good{background:#E7F3EC;color:var(--success);}
.vbadge.bad{background:#FBEAEA;color:var(--danger);}
.vbadge.mid{background:#FBF3DC;color:var(--amber);}
.confrow{display:flex;justify-content:space-between;font-size:8.5px;font-weight:700;color:var(--ink-soft);margin-bottom:3px;}
.cbar{height:5px;border-radius:99px;background:#F0E8D8;overflow:hidden;margin-bottom:7px;}
.cbar i{display:block;height:100%;background:linear-gradient(90deg,var(--orange),var(--orange-dark));border-radius:99px;transition:width .5s;}
.vnote{font-size:9px;line-height:1.55;background:#FBF7EE;border-left:2.5px solid var(--amber);border-radius:7px;padding:7px 9px;margin-bottom:6px;color:var(--ink);}
.vrem{font-size:9px;line-height:1.55;background:var(--orange-dim);border-radius:7px;padding:7px 9px;}
.vrem b{color:var(--orange-dark);font-family:var(--fh);font-size:7.5px;letter-spacing:.1em;display:block;margin-bottom:1px;}

.hint{position:fixed;left:14px;bottom:96px;z-index:38;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);
  border:1px solid var(--line);border-radius:13px;padding:9px 12px;font-size:10px;color:var(--ink-soft);line-height:1.6;max-width:190px;box-shadow:0 8px 24px rgba(58,46,34,.12);}
.hint b{color:var(--ink);}
.hint .close{float:right;border:none;background:none;cursor:pointer;font-weight:700;color:var(--ink-faint);margin-left:6px;}

.toast{position:fixed;top:58px;left:50%;transform:translateX(-50%) translateY(-90px);background:var(--ink);color:#fff;font-size:11.5px;font-weight:700;padding:9px 16px;border-radius:99px;z-index:99;transition:transform .32s cubic-bezier(.22,1,.36,1);box-shadow:0 12px 34px rgba(0,0,0,.3);}
.toast.show{transform:translateX(-50%) translateY(0);}
@media(max-width:760px){
  .bseg.hideS{display:none;}
  .sel{width:calc(100vw - 28px);right:14px;}
}
</style>
</head>
<body>

<svg id="cv"></svg>

<div class="bar" id="topBar">
  <div class="logo" id="dragHandle" title="Drag karke kahin bhi rakho">VG</div>
  <div class="bseg">
    <button class="hbtn" id="undoB" title="Undo (Ctrl+Z)" disabled><i class="ti ti-arrow-back-up"></i></button>
    <button class="hbtn" id="redoB" title="Redo (Ctrl+Y)" disabled><i class="ti ti-arrow-forward-up"></i></button>
  </div>
  <div class="bseg"><input type="text" id="projName" value="Amb Niwas — GF"></div>
  <div class="bseg"><button class="btn" id="addEnt"><i class="ti ti-door-enter"></i> Entrance</button></div>
  <div class="bseg"><button class="btn" id="editBndBtn"><i class="ti ti-pencil"></i> Edit boundary</button></div>
  <div class="bseg"><label>Plot</label>
    <input type="number" id="plotW" value="48" min="15" max="120"><span style="font-size:10px;color:var(--ink-faint)">×</span>
    <input type="number" id="plotH" value="50" min="15" max="120"><span style="font-size:9px;color:var(--ink-faint)">ft</span>
    <button class="btn" id="resetBnd" title="Boundary ko seedha rectangle bana do"><i class="ti ti-rotate"></i> Rect</button></div>
  <div class="bseg"><label>North</label>
    <select id="northDir"><option value="up">↑</option><option value="down" selected>↓</option><option value="left">←</option><option value="right">→</option></select></div>
  <div class="bseg hideS"><label>Wall</label>
    <select id="outerWall"><option value="0.75">9"</option><option value="1">12"</option><option value="0.5">6"</option></select>
    <select id="innerWall"><option value="0.33">4"</option><option value="0.5">6"</option><option value="0.75">9"</option></select></div>
  <div class="bseg hideS"><label>Grid</label><select id="showGrid"><option value="1">On</option><option value="0">Off</option></select></div>
  <div class="bseg">
    <div class="ring">
      <svg width="34" height="34" viewBox="0 0 34 34">
        <circle cx="17" cy="17" r="13.5" fill="none" stroke="#F0E8D8" stroke-width="3.5"/>
        <circle id="ringFill" cx="17" cy="17" r="13.5" fill="none" stroke="#E08A3C" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="84.8" stroke-dashoffset="84.8" style="transition:stroke-dashoffset .7s cubic-bezier(.22,1,.36,1), stroke .4s;"/>
      </svg>
      <div class="v" id="scoreVal">—</div>
    </div>
  </div>
</div>

<div class="zoomer">
  <button class="zbtn" id="zIn"><i class="ti ti-plus"></i></button>
  <button class="zbtn" id="zOut"><i class="ti ti-minus"></i></button>
  <button class="zbtn" id="zFit" title="Fit" style="font-size:14px"><i class="ti ti-focus-2"></i></button>
</div>

<div class="hint" id="hint"><button class="close" onclick="this.parentElement.remove()"><i class="ti ti-x"></i></button>
  <b>Drag</b> kamra = move · <b>corner dot</b> = resize<br><b>Khali jagah drag</b> = pan · <b>scroll</b> = zoom<br>Neeche dock se naye kamre jodein.<br><b>Edit boundary</b> ON karke corners drag/add/remove karein — irregular plot ke liye.<br>Vastu zones plot ke <b>bounding-box</b> par based hain (irregular plots ke liye approximation).</div>

<div class="dock"><div class="chips" id="chips"></div></div>

<div class="sel" id="selCard"></div>

<div class="toast" id="toast"></div>

<script>
/* ================= KB ================= */
const DEITY={NW:'Vayu',N:'Kubera',NE:'Ishan',W:'Varuna',C:'Brahma',E:'Indra',SW:'Pitru',S:'Yama',SE:'Agni'};
const KB={
 bedroom:{nm:'Bedroom',ic:'🛏️',fill:'#E7EDE4',best:['SW'],ok:['S','W','NW'],avoid:['NE','SE'],conf:{SW:[93,74],S:[80,62],W:[78,60],NW:[70,54],NE:[91,70],SE:[84,58]},note:'Jagah (SW) par sources lagbhag ek-mat; <b>asar</b> par raay bati hui hai.',rem:'SW na mile to sirhana South wall se lagayein.'},
 kitchen:{nm:'Rasoi',ic:'🍳',fill:'#F6E3CE',best:['SE'],ok:['NW'],avoid:['NE','N','C'],conf:{SE:[92,81],NW:[74,55],NE:[94,79],N:[82,60],C:[90,76]},note:'SE (Agni) par near-universal consensus. NW par raay bati hui.',rem:'SE na ho to pakate waqt mooh East ki taraf.'},
 pooja:{nm:'Pooja',ic:'🪔',fill:'#F9EFD4',best:['NE'],ok:['N','E'],avoid:['S','SW'],conf:{NE:[96,86],N:[85,70],E:[84,69],S:[92,78],SW:[90,75]},note:'Ishan (NE) — Vastu ka sabse strong consensus.',rem:'NE na ho: N/E mein, murti ka mukh West.'},
 toilet:{nm:'Toilet',ic:'🚽',fill:'#DFE8ED',best:['NW'],ok:['W','S'],avoid:['NE','C','SW'],conf:{NW:[86,68],W:[76,58],S:[70,52],NE:[95,82],C:[93,80],SW:[81,63]},note:'"Kahan NAHI" par zyada consensus (NE/center kabhi nahi).',rem:'Galat zone: darwaza band + salt bowl; asli fix relocation.'},
 bath:{nm:'Bathroom',ic:'🛁',fill:'#DFE8ED',best:['NW','E'],ok:['W'],avoid:['NE','SW','C'],conf:{NW:[82,64],E:[78,60],W:[72,55],NE:[90,74],SW:[80,62],C:[88,72]},note:'Bathing (bina WC) ke liye East bhi accepted.',rem:'Drain ka dhaal North/East ki taraf.'},
 living:{nm:'Living',ic:'🛋️',fill:'#F2ECDD',best:['N','NE','E'],ok:['NW','C'],avoid:['SW'],conf:{N:[82,64],NE:[80,62],E:[81,63],NW:[70,52],C:[66,50],SW:[72,55]},note:'Flexible — N/E side par halki preference.',rem:'Bhaari furniture S/W walls par, NE khula.'},
 dining:{nm:'Dining',ic:'🍽️',fill:'#EFE7D4',best:['W'],ok:['E','S'],avoid:[],conf:{W:[74,56],E:[70,52],S:[68,50]},note:'Sources yahan sabse kam sehmat — halki West preference.',rem:'Khaate waqt mooh East/North.'},
 store:{nm:'Store',ic:'📦',fill:'#EAE4DA',best:['SW','W'],ok:['S','NW'],avoid:['NE','C'],conf:{SW:[84,66],W:[80,62],S:[74,56],NW:[70,52],NE:[88,72],C:[90,76]},note:'Bhaari saman = bhaari zone. Accha consensus.',rem:'NE mein sirf halka saman.'},
 study:{nm:'Study',ic:'📚',fill:'#E7EAF2',best:['NE','E','N'],ok:['W'],avoid:['SW'],conf:{NE:[83,66],E:[82,65],N:[80,63],W:[68,50],SW:[70,54]},note:'Modern sources zyada sehmat; classical mein kam zikr.',rem:'Mooh East/North, peeth wall se.'},
 guest:{nm:'Guest',ic:'🚪',fill:'#E7EDE4',best:['NW'],ok:['N','W'],avoid:['SW'],conf:{NW:[85,68],N:[74,56],W:[72,55],SW:[78,60]},note:'NW (Vayu — movement) guest ke liye classic.',rem:'SW guest ko nahi — wo mukhiya ka zone hai.'},
 utility:{nm:'Utility',ic:'🧺',fill:'#ECE8E0',best:['NW','SE'],ok:['W'],avoid:['NE'],conf:{NW:[72,54],SE:[70,52],W:[66,50],NE:[80,62]},note:'Kam-researched — NW/SE dono mile-jule.',rem:'Machines NE se door.'},
 stairs:{nm:'Stairs',ic:'🪜',fill:'#E8E1D4',best:['SW','S','W'],ok:['SE'],avoid:['NE','C'],conf:{SW:[86,68],S:[80,62],W:[78,60],SE:[68,52],NE:[92,76],C:[94,80]},note:'NE/Brahmasthan mein seedhi par strong "nahi".',rem:'Clockwise chadhna shubh.'},
};
const ZG={
 up:[['NW','N','NE'],['W','C','E'],['SW','S','SE']],
 down:[['SE','S','SW'],['E','C','W'],['NE','N','NW']],
 left:[['NE','E','SE'],['N','C','S'],['NW','W','SW']],
 right:[['SW','W','NW'],['S','C','N'],['SE','E','NE']],
};
/* ASSUMPTION (flagged, not from a spec): main-entrance zone rules — commonly
   cited Vastu guidance. Correct these best/avoid lists if they're wrong. */
const ENT={best:['N','NE','E'],avoid:['S','SW','SE'],conf:{N:[88,72],NE:[92,78],E:[87,70],S:[84,64],SW:[86,66],SE:[80,60],W:[70,54],NW:[72,55],C:[60,48]},
 note:'Beginner rule: N/NE/E shubh maane jaate hain. Advanced view: exact pada gross direction se zyada matter karta hai.',
 rem:'Threshold (dehleez) banayein, gate clockwise khule to behtar.'};

/* ================= state ================= */
/* pts = plot boundary polygon, in ft — [[x,y],...]. Default is a plain
   rectangle from the Plot W×H inputs; "Edit boundary" mode lets a user
   drag/add/remove vertices to make it slanted or zig-zag. plotW/plotH
   below are ONLY the last-entered "reset to rectangle" size, not the
   live boundary — once it's been edited into a non-rectangle, those two
   numbers no longer describe it (same as a real irregular plot). */
let pts=[[0,0],[48,0],[48,50],[0,50]];
let plotW=48, plotH=50, northDir='down', outerT=0.75, innerT=0.33, showGrid=true;
let rooms=[], selId=null, nextN={};
let entrance=null, selEnt=false;   /* entrance:{edge,t,w} — edge index into pts, pos/width on that edge */
let editBnd=false;
const FT=14;                       /* world px per ft (fixed) */
let vb={x:0,y:0,w:1000,h:700};     /* viewBox = camera */
const cv=document.getElementById('cv');
const NS='http://www.w3.org/2000/svg';
function el(t,at,parent){const e=document.createElementNS(NS,t);for(const k in at)e.setAttribute(k,at[k]);(parent||cv).appendChild(e);return e;}

/* ================= boundary geometry ================= */
function bbox(){
  let x1=1e9,y1=1e9,x2=-1e9,y2=-1e9;
  pts.forEach(([x,y])=>{x1=Math.min(x1,x);y1=Math.min(y1,y);x2=Math.max(x2,x);y2=Math.max(y2,y);});
  return{x1,y1,x2,y2,w:x2-x1,h:y2-y1};
}
function inPoly(x,y){
  let inside=false;
  for(let i=0,j=pts.length-1;i<pts.length;j=i++){
    const[xi,yi]=pts[i],[xj,yj]=pts[j];
    if(((yi>y)!==(yj>y))&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi))inside=!inside;
  }
  return inside;
}
function roomInside(r){
  const e=0.05;
  return inPoly(r.x+e,r.y+e)&&inPoly(r.x+r.w-e,r.y+e)&&inPoly(r.x+e,r.y+r.h-e)&&inPoly(r.x+r.w-e,r.y+r.h-e);
}

const worldW=()=>bbox().w*FT+300, worldH=()=>bbox().h*FT+140;
function fit(){
  const vw=innerWidth,vh=innerHeight;
  const m=1.06;
  const b=bbox();
  const ww=worldW()*m, wh=worldH()*m;
  const ar=vw/vh, war=ww/wh;
  if(war>ar){vb.w=ww;vb.h=ww/ar;}else{vb.h=wh;vb.w=wh*ar;}
  vb.x=b.x1*FT-(vb.w-worldW())/2 - 40; vb.y=b.y1*FT-(vb.h-worldH())/2 - 30;
  applyVB();
}
function applyVB(){cv.setAttribute('viewBox',`${vb.x} ${vb.y} ${vb.w} ${vb.h}`);}

/* Zones map onto the polygon's bounding box — an approximation for
   irregular plots, called out in the Plot panel UI. */
function zoneOfXY(px,py){
  const b=bbox();
  const cx=(px-b.x1)/b.w, cy=(py-b.y1)/b.h;
  const c=clamp(Math.floor(cx*3),0,2), ro=clamp(Math.floor(cy*3),0,2);
  return ZG[northDir][ro][c];
}
function zoneOf(r){return zoneOfXY(r.x+r.w/2,r.y+r.h/2);}
function vOf(r){const k=KB[r.key],z=zoneOf(r);return k.best.includes(z)?'good':k.avoid.includes(z)?'bad':'mid';}
const VC={good:'#3D8B5F',bad:'#C24545',mid:'#C08A1E'};

/* ================= entrance geometry (on a polygon edge: edge/t/w) ================= */
function entMid(){
  const e=entrance;
  const a=pts[e.edge], b=pts[(e.edge+1)%pts.length];
  return[a[0]+(b[0]-a[0])*e.t, a[1]+(b[1]-a[1])*e.t];
}
function entZone(){const[mx,my]=entMid();return zoneOfXY(mx,my);}
function vOfEnt(){const z=entZone();return ENT.best.includes(z)?'good':ENT.avoid.includes(z)?'bad':'mid';}

/* ================= undo/redo history ================= */
let hist=[], hi=-1;
function snapshot(){
  return JSON.stringify({pts,plotW,plotH,northDir,outerT,innerT,showGrid,rooms,entrance,projName:document.getElementById('projName').value});
}
function pushHistory(){
  hist.length=hi+1;                 /* drop any redo-able future */
  hist.push(snapshot());
  if(hist.length>50)hist.shift(); else hi++;
  hbtns();
}
function restore(s){
  const st=JSON.parse(s);
  pts=st.pts;plotW=st.plotW;plotH=st.plotH;northDir=st.northDir;outerT=st.outerT;innerT=st.innerT;showGrid=st.showGrid;
  rooms=st.rooms;entrance=st.entrance;
  selId=null;selEnt=false;editBnd=false;
  document.getElementById('projName').value=st.projName;
  document.getElementById('plotW').value=plotW;
  document.getElementById('plotH').value=plotH;
  document.getElementById('northDir').value=northDir;
  document.getElementById('outerWall').value=String(outerT);
  document.getElementById('innerWall').value=String(innerT);
  document.getElementById('showGrid').value=showGrid?'1':'0';
  render();selPanel();hbtns();
}
function undo(){if(hi<=0)return;hi--;restore(hist[hi]);}
function redo(){if(hi>=hist.length-1)return;hi++;restore(hist[hi]);}
function hbtns(){
  document.getElementById('undoB').disabled=hi<=0;
  document.getElementById('redoB').disabled=hi>=hist.length-1;
}
window.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&!e.shiftKey&&e.key.toLowerCase()==='z'){e.preventDefault();undo();}
  if(((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='y')||((e.ctrlKey||e.metaKey)&&e.shiftKey&&e.key.toLowerCase()==='z')){e.preventDefault();redo();}
});

    const c=pts[(i+1)%pts.length];

  const tb=el('g',{transform:`translate(${W+22+b.x1*s},${H-88+b.y1*s})`},g);
  el('rect',{x:0,y:0,width:116,height:88,fill:'#FFF',stroke:'#2B2013',['stroke-width']:1.2},tb);
  el('line',{x1:0,y1:25,x2:116,y2:25,stroke:'#2B2013',['stroke-width']:1},tb);

  el('line',{x1:0,y1:68,x2:116,y2:68,stroke:'#2B2013',['stroke-width']:.5},tb);
  el('text',{x:58,y:16,['text-anchor']:'middle',style:'font-family:Poppins;font-weight:700;font-size:8.5px',fill:'#2B2013'},tb).textContent=document.getElementById('projName').value.toUpperCase().slice(0,22);
  el('text',{x:6,y:40,style:'font-family:DM Mono;font-size:7px',fill:'#7A6B52'},tb).textContent='FLOOR PLAN — GROUND';

  el('text',{x:6,y:81,style:'font-family:DM Mono;font-size:7px',fill:'#7A6B52'},tb).textContent='VASTU GRIHA · '+new Date().toLocaleDateString('en-IN');

  applyVB(); wire(); updateScore();
}

/* Door leaf: hinge ('a'|'b') picks which corner of the opening the hinge
   post sits at; swingOut (bool) picks whether the quarter-circle arc
   swings into the room (default, false) or out of it (true) — together
   these two independent toggles give all 4 real-world orientations. */
function drawDoor(grp,r,d,s,it,fill){
  const dw=d.w*s;
  const [px,py,horiz]=sidePoint(r,d.side,d.t,s,dw);
  el('rect',horiz?{x:px,y:py-it/2-1,width:dw,height:it+2,fill}:{x:px-it/2-1,y:py,width:it+2,height:dw,fill},grp);
  const inward=horiz?(d.side==='top'?1:-1):(d.side==='left'?1:-1);
  const dir=d.swingOut?-inward:inward;
  if(horiz){
    const hx=d.hinge==='b'?px+dw:px, fx=d.hinge==='b'?px:px+dw;
    const ex=hx, ey=py+dir*dw;
    el('line',{x1:hx,y1:py,x2:ex,y2:ey,stroke:'#2B2013',['stroke-width']:2},grp);
    const cross=(fx-hx)*(ey-py);
    el('path',{d:`M ${fx} ${py} A ${dw} ${dw} 0 0 ${cross>0?1:0} ${ex} ${ey}`,fill:'none',stroke:'#8A7A5C',['stroke-width']:1,['stroke-dasharray']:'3 3'},grp);
  }else{
    const hy=d.hinge==='b'?py+dw:py, fy=d.hinge==='b'?py:py+dw;
    const ex=px+dir*dw, ey=hy;
    el('line',{x1:px,y1:hy,x2:ex,y2:ey,stroke:'#2B2013',['stroke-width']:2},grp);
    const cross=(ex-px)*(fy-hy)*-1;
    el('path',{d:`M ${px} ${fy} A ${dw} ${dw} 0 0 ${cross>0?1:0} ${ex} ${ey}`,fill:'none',stroke:'#8A7A5C',['stroke-width']:1,['stroke-dasharray']:'3 3'},grp);
  }
}
function drawWin(grp,r,wd,s,it){
  const ww=wd.w*s;
  const [px,py,horiz]=sidePoint(r,wd.side,wd.t,s,ww);
  if(horiz){
    el('rect',{x:px,y:py-it/2-1,width:ww,height:it+2,fill:'#FFF'},grp);
    [-it/2,0,it/2].forEach(o=>el('line',{x1:px,y1:py+o,x2:px+ww,y2:py+o,stroke:'#2B2013',['stroke-width']:1},grp));
  }else{
    el('rect',{x:px-it/2-1,y:py,width:it+2,height:ww,fill:'#FFF'},grp);
    [-it/2,0,it/2].forEach(o=>el('line',{x1:px+o,y1:py,x2:px+o,y2:py+ww,stroke:'#2B2013',['stroke-width']:1},grp));
  }
}
function sidePoint(r,side,t,s,len){
  const x=r.x*s,y=r.y*s,w=r.w*s,h=r.h*s;
  if(side==='top')return[x+(w-len)*t,y,true];
  if(side==='bottom')return[x+(w-len)*t,y+h,true];
  if(side==='left')return[x,y+(h-len)*t,false];
  return[x+w,y+(h-len)*t,false];
}
function fmtFt(v){const f=Math.floor(v),i=Math.round((v-f)*12);return i?`${f}'-${i}"`:`${f}'-0"`;}

/* ================= stairs — 2D-symbolic tread rendering ================= */
function drawStairs(grp,x,y,w,h,style){
  const long=w>=h;
  const tread=FT;   /* ~1ft spacing */
  const line=(x1,y1,x2,y2)=>el('line',{x1,y1,x2,y2,stroke:'#5A4A34',['stroke-width']:1},grp);
  const arrow=(cx,cy,alongLong)=>{
    if(alongLong){
      el('line',{x1:x+6,y1:cy,x2:x+w-10,y2:cy,stroke:'#2B2013',['stroke-width']:1.4},grp);
      el('path',{d:`M ${x+w-10} ${cy-4} L ${x+w-2} ${cy} L ${x+w-10} ${cy+4}`,fill:'none',stroke:'#2B2013',['stroke-width']:1.4},grp);
    }else{
      el('line',{x1:cx,y1:y+6,x2:cx,y2:y+h-10,stroke:'#2B2013',['stroke-width']:1.4},grp);
      el('path',{d:`M ${cx-4} ${y+h-10} L ${cx} ${y+h-2} L ${cx+4} ${y+h-10}`,fill:'none',stroke:'#2B2013',['stroke-width']:1.4},grp);
    }
    el('text',{x:cx,y:cy-6,['text-anchor']:'middle',style:'font-family:DM Mono;font-weight:700;font-size:8px',fill:'#2B2013'},grp).textContent='UP';
  };
  if(style==='straight'){
    if(long)for(let px=x+tread;px<x+w;px+=tread)line(px,y,px,y+h);
    else for(let py=y+tread;py<y+h;py+=tread)line(x,py,x+w,py);
    arrow(x+w/2,y+h/2,long);
  }else if(style==='L'){
    const land=Math.min(w,h)*0.45;
    if(long){
      for(let px=x+tread;px<x+w-land;px+=tread)line(px,y,px,y+h*0.5);
      el('rect',{x:x+w-land,y,width:land,height:h*0.5,fill:'none',stroke:'#5A4A34',['stroke-width']:1},grp);
      for(let py=y+h*0.5+tread;py<y+h;py+=tread)line(x+w-land,py,x+w,py);
    }else{
      for(let py=y+tread;py<y+h-land;py+=tread)line(x,py,x+w*0.5,py);
      el('rect',{x,y:y+h-land,width:w*0.5,height:land,fill:'none',stroke:'#5A4A34',['stroke-width']:1},grp);
      for(let px=x+w*0.5+tread;px<x+w;px+=tread)line(px,y+h-land,px,y+h);
    }
    el('text',{x:x+w/2,y:y+h/2,['text-anchor']:'middle',style:'font-family:DM Mono;font-weight:700;font-size:8px',fill:'#5A4A34'},grp).textContent='UP';
  }else{ /* U-shaped */
    if(long){
      const half=h/2, land=Math.min(w*0.22,3*FT);
      for(let px=x+tread;px<x+w-land;px+=tread){line(px,y,px,y+half);line(px,y+half,px,y+h);}
      el('rect',{x:x+w-land,y,width:land,height:h,fill:'none',stroke:'#5A4A34',['stroke-width']:1},grp);
      line(x,y+half,x+w-land,y+half);
    }else{
      const half=w/2, land=Math.min(h*0.22,3*FT);
      for(let py=y+tread;py<y+h-land;py+=tread){line(x,py,x+half,py);line(x+half,py,x+w,py);}
      el('rect',{x,y:y+h-land,width:w,height:land,fill:'none',stroke:'#5A4A34',['stroke-width']:1},grp);
      line(x+half,y,x+half,y+h-land);
    }
    el('text',{x:x+w/2,y:y+h/2,['text-anchor']:'middle',style:'font-family:DM Mono;font-weight:700;font-size:8px',fill:'#5A4A34'},grp).textContent='UP';
  }
}

/* ================= entrance gate — double-leaf, on a polygon boundary edge ================= */
function drawEntrance(g,s,ot){
  const e=entrance;
  const a=pts[e.edge]||pts[0], c=pts[(e.edge+1)%pts.length]||pts[1];
  const ax=a[0],ay=a[1];
  const elen=Math.hypot(c[0]-a[0],c[1]-a[1])||1;
  const ux=(c[0]-a[0])/elen, uy=(c[1]-a[1])/elen;
  const gw=Math.min(e.w,elen*0.9);
  const startFt=clamp(e.t*elen-gw/2,0,elen-gw);
  const sx=(ax+ux*startFt)*s, sy=(ay+uy*startFt)*s;
  const ex=(ax+ux*(startFt+gw))*s, ey=(ay+uy*(startFt+gw))*s;
  /* outward normal (away from plot interior, using the polygon centroid) */
  let nx=uy,ny=-ux;
  const cx=(sx+ex)/2, cy=(sy+ey)/2;
  const centroid=pts.reduce((p,q)=>[p[0]+q[0]/pts.length,p[1]+q[1]/pts.length],[0,0]);
  if((centroid[0]*s-cx)*nx+(centroid[1]*s-cy)*ny>0){nx=-nx;ny=-ny;}   /* nx,ny points OUTWARD */
  const half=(gw*s)/2;
  /* gap in the boundary wall */
  el('line',{x1:sx,y1:sy,x2:ex,y2:ey,stroke:'#FCF8F0',['stroke-width']:ot+2},g);
  /* two leaves swinging outward (gate opens away from the house) */
  const mx=(sx+ex)/2, my=(sy+ey)/2;
  el('line',{x1:sx,y1:sy,x2:sx-nx*half,y2:sy-ny*half,stroke:'#2B2013',['stroke-width']:2.2},g);
  el('line',{x1:ex,y1:ey,x2:ex-nx*half,y2:ey-ny*half,stroke:'#2B2013',['stroke-width']:2.2},g);
  el('path',{d:`M ${sx} ${sy} A ${half} ${half} 0 0 1 ${sx-nx*half} ${sy-ny*half}`,fill:'none',stroke:'#8A7A5C',['stroke-width']:1,['stroke-dasharray']:'3 3'},g);
  el('path',{d:`M ${ex} ${ey} A ${half} ${half} 0 0 0 ${ex-nx*half} ${ey-ny*half}`,fill:'none',stroke:'#8A7A5C',['stroke-width']:1,['stroke-dasharray']:'3 3'},g);
  /* label, placed straight out from the wall (perpendicular to it) */
  const lx=mx+nx*(ot+16), ly=my+ny*(ot+16);
  const v=vOfEnt();
  el('rect',{x:lx-34,y:ly-9,width:68,height:18,rx:9,fill:VC[v]},g);
  el('text',{x:lx,y:ly+3.5,['text-anchor']:'middle',style:'font-family:Poppins;font-weight:800;font-size:8.5px;letter-spacing:.08em',fill:'#FFF'},g).textContent='ENTRANCE';
  /* clickable hotspot to select it */
  el('circle',{cx:mx,cy:my,r:14,fill:'transparent',class:'entHot',style:'cursor:pointer;pointer-events:all'},g);
}

/* ================= camera + interactions ================= */
let drag=null;
function wire(){
  cv.querySelectorAll('.roomg').forEach(gr=>{
    gr.addEventListener('pointerdown',e=>{
      if(e.target.classList.contains('rsz'))return;
      const id=gr.dataset.id;selEnt=false;select(id);
      const r=rooms.find(r=>r.id===id);const p=wpt(e);
      drag={type:'move',id,ox:r.x,oy:r.y,px:p.x,py:p.y,moved:false};
      e.stopPropagation();e.preventDefault();
    });
  });
  cv.querySelectorAll('.rsz').forEach(hd=>{
    hd.addEventListener('pointerdown',e=>{
      const id=hd.dataset.id;const r=rooms.find(r=>r.id===id);const p=wpt(e);
      drag={type:'size',id,ow:r.w,oh:r.h,px:p.x,py:p.y,moved:false};
      e.stopPropagation();e.preventDefault();
    });
  });
  const hot=cv.querySelector('.entHot');
  if(hot)hot.addEventListener('pointerdown',e=>{selEnt=true;selId=null;render();selPanel();e.stopPropagation();});
  cv.querySelectorAll('.vtx').forEach(v=>{
    v.addEventListener('pointerdown',e=>{
      drag={type:'vtx',i:+v.dataset.i,moved:false};
      e.stopPropagation();e.preventDefault();
    });
    v.addEventListener('dblclick',e=>{
      if(pts.length<=4){toast('Kam se kam 4 corner chahiye');return;}
      pts.splice(+v.dataset.i,1);
      if(entrance)entrance.edge=Math.min(entrance.edge,pts.length-1);
      pushHistory();render();
      e.stopPropagation();
    });
  });
}
cv.addEventListener('pointerdown',e=>{ /* pan on empty */
  const p=wpt(e);
  drag={type:'pan',px:e.clientX,py:e.clientY,vx:vb.x,vy:vb.y};
  cv.classList.add('panning');
});
cv.addEventListener('dblclick',e=>{
  if(!editBnd)return;
  const p=wpt(e), s=FT;
  /* find nearest edge to insert a new vertex on */
  let bi=-1,bd=1e9,bt=0;
  pts.forEach((a,i)=>{
    const c=pts[(i+1)%pts.length];
    const ax=a[0]*s,ay=a[1]*s,cx=c[0]*s,cy=c[1]*s;
    const dx=cx-ax,dy=cy-ay;const L2=dx*dx+dy*dy||1;
    let t=((p.x-ax)*dx+(p.y-ay)*dy)/L2;t=clamp(t,0,1);
    const qx=ax+dx*t,qy=ay+dy*t;
    const d=Math.hypot(p.x-qx,p.y-qy);
    if(d<bd){bd=d;bi=i;bt=t;}
  });
  if(bd<20){
    const a=pts[bi],c=pts[(bi+1)%pts.length];
    const nx=Math.round((a[0]+(c[0]-a[0])*bt)*2)/2, ny=Math.round((a[1]+(c[1]-a[1])*bt)*2)/2;
    pts.splice(bi+1,0,[nx,ny]);
    pushHistory();render();toast('Naya corner add hua — ab use drag karo');
  }
});
window.addEventListener('pointermove',e=>{
  if(!drag)return;
  if(drag.type==='pan'){
    const k=vb.w/innerWidth;
    vb.x=drag.vx-(e.clientX-drag.px)*k;
    vb.y=drag.vy-(e.clientY-drag.py)*k;
    applyVB();return;
  }
  const p=wpt(e), s=FT;
  if(drag.type==='vtx'){
    pts[drag.i]=[Math.round(p.x/s*2)/2,Math.round(p.y/s*2)/2];
    drag.moved=true;render();return;
  }
  const r=rooms.find(r=>r.id===drag.id);
  if(drag.type==='move'){
    const nx=Math.round((drag.ox+(p.x-drag.px)/s)*2)/2;
    const ny=Math.round((drag.oy+(p.y-drag.py)/s)*2)/2;
    const t={...r,x:nx,y:ny};
    if(roomInside(t)){r.x=nx;r.y=ny;}
  }else{
    const nw=clamp(Math.round((drag.ow+(p.x-drag.px)/s)*2)/2,3,999);
    const nh=clamp(Math.round((drag.oh+(p.y-drag.py)/s)*2)/2,3,999);
    const t={...r,w:nw,h:nh};
    if(roomInside(t)){r.w=nw;r.h=nh;}
  }
  drag.moved=true;
  render();selPanel();
});
window.addEventListener('pointerup',()=>{
  if(drag&&drag.moved)pushHistory();   /* ONE history entry per drag, not per frame */
  drag=null;cv.classList.remove('panning');
});
cv.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY>0?1.1:1/1.1;
  const p=wpt(e);
  const nw=clamp(vb.w*f,worldW()*0.18,worldW()*4);
  const k=nw/vb.w;
  vb.x=p.x-(p.x-vb.x)*k; vb.y=p.y-(p.y-vb.y)*k;
  vb.w=nw; vb.h*=k;
  applyVB();
},{passive:false});
function wpt(e){
  const pt=cv.createSVGPoint();pt.x=e.clientX;pt.y=e.clientY;
  return pt.matrixTransform(cv.getScreenCTM().inverse());
}
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

/* ================= rooms ================= */
function freeSpot(w,h){
  const b=bbox();
  for(let y=b.y1+1;y<=b.y2-h;y+=1)for(let x=b.x1+1;x<=b.x2-w;x+=1){
    const t={x,y,w,h};
    if(!roomInside(t))continue;
    const hit=rooms.some(r=>x<r.x+r.w+1&&x+w+1>r.x&&y<r.y+r.h+1&&y+h+1>r.y);
    if(!hit)return{x,y};
  }
  return{x:b.x1+1,y:b.y1+1};
}
function addRoom(key){
  nextN[key]=(nextN[key]||0)+1;const n=nextN[key];const k=KB[key];
  const b=bbox();
  const w=Math.min(12,b.w-2),h=Math.min(10,b.h-2);
  const sp=freeSpot(w,h);
  const id='r'+Date.now()+Math.random().toString(36).slice(2,5);
  rooms.push({id,key,nm:k.nm+(n>1?' '+n:''),x:sp.x,y:sp.y,w,h,stairStyle:'straight',doors:[{side:'bottom',t:.5,w:3,hinge:'a',swingOut:false}],wins:[]});
  selEnt=false;select(id);pushHistory();toast(k.nm+(n>1?' '+n:'')+' add ho gaya');
}

    <div class="btnrow">

  document.getElementById('rH').onchange=e=>{const t={...r,h:+e.target.value};if(roomInside(t)){r.h=+e.target.value;pushHistory();}else toast('Boundary ke bahar nahi ja sakta');render();selPanel();};
  if(r.key==='stairs')document.getElementById('rStyle').onchange=e=>{r.stairStyle=e.target.value;pushHistory();render();};

      <input type="range" class="wpos" data-i="${i}" min="0" max="1" step="0.05" value="${wd.t}">

    op.appendChild(row);

  op.querySelectorAll('.dside').forEach(sl=>sl.onchange=e=>{r.doors[+e.target.dataset.i].side=e.target.value;pushHistory();render();});
  op.querySelectorAll('.dpos').forEach(sl=>{sl.oninput=e=>{r.doors[+e.target.dataset.i].t=+e.target.value;render();};sl.onchange=()=>pushHistory();});

/* ================= score ================= */
function updateScore(){
  const ring=document.getElementById('ringFill'),val=document.getElementById('scoreVal');
  const verdicts=[...rooms.map(vOf),...(entrance?[vOfEnt()]:[])];
  if(!verdicts.length){ring.style.strokeDashoffset=84.8;val.textContent='—';return;}
  let s=0;verdicts.forEach(v=>{s+=v==='good'?100:v==='mid'?62:18;});
  const sc=Math.round(s/verdicts.length),C=84.8;
  ring.style.strokeDashoffset=C-(C*sc/100);
  ring.style.stroke=sc>=75?'#3D8B5F':sc>=45?'#C08A1E':'#C24545';
  val.textContent=sc;
}

document.getElementById('zOut').onclick=()=>{const p={x:vb.x+vb.w/2,y:vb.y+vb.h/2};const k=1.2;vb.x=p.x-(p.x-vb.x)*k;vb.y=p.y-(p.y-vb.y)*k;vb.w*=k;vb.h*=k;applyVB();};

/* ================= draggable top bar — grab the logo, park it anywhere ================= */
(function(){
  const bar=document.getElementById('topBar'), handle=document.getElementById('dragHandle');
  let dg=null;
  handle.addEventListener('pointerdown',e=>{
    const r=bar.getBoundingClientRect();
    /* first drag: switch from the centered left:50%/transform positioning
       to an explicit left/top so it can actually be moved and parked. */
    bar.style.left=r.left+'px';
    bar.style.top=r.top+'px';
    bar.style.transform='none';
    dg={ox:r.left,oy:r.top,px:e.clientX,py:e.clientY};
    bar.classList.add('dragging');
    handle.setPointerCapture(e.pointerId);
    e.preventDefault();e.stopPropagation();
  });
  handle.addEventListener('pointermove',e=>{
    if(!dg)return;
    const nx=clamp(dg.ox+(e.clientX-dg.px),0,innerWidth-bar.offsetWidth);
    const ny=clamp(dg.oy+(e.clientY-dg.py),0,innerHeight-bar.offsetHeight);
    bar.style.left=nx+'px';
    bar.style.top=ny+'px';
  });
  const endDrag=()=>{dg=null;bar.classList.remove('dragging');};
  handle.addEventListener('pointerup',endDrag);
  handle.addEventListener('pointercancel',endDrag);
})();

let tt;function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2000);}

entrance={edge:3,t:.4,w:4};

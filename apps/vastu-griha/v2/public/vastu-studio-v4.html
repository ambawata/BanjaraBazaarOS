<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vastu Griha — Studio v4</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --orange:#E08A3C; --orange-dark:#C96F24; --orange-dim:rgba(224,138,60,.14);
  --ink:#3A2E22; --ink-soft:#8A7A5C; --ink-faint:#B3A78F;
  --card:#FFFFFF; --line:#EEE4D2;
  --danger:#C24545; --success:#3D8B5F; --amber:#C08A1E;
  --fh:'Poppins',sans-serif; --fb:'Inter',sans-serif; --fm:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--fb);color:var(--ink);
  background:radial-gradient(circle at 1px 1px, #E3D8C2 1px, transparent 0) 0 0/24px 24px, #EFE8D8;}

/* ============ full-bleed canvas ============ */
#cv{position:fixed;inset:0;width:100%;height:100%;touch-action:none;user-select:none;cursor:grab;}
#cv.panning{cursor:grabbing;}
svg text{user-select:none;pointer-events:none;}

/* ============ floating top bar ============ */
.bar{position:fixed;top:12px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:16px;
  padding:7px 10px;box-shadow:0 10px 34px rgba(58,46,34,.14);z-index:40;max-width:calc(100vw - 24px);overflow-x:auto;scrollbar-width:none;}
.bar::-webkit-scrollbar{display:none;}
.logo{width:28px;height:28px;border-radius:9px;background:linear-gradient(135deg,var(--orange),#D97B26);display:grid;place-items:center;font-family:var(--fh);font-weight:800;font-size:11px;color:#fff;flex:0 0 auto;}
.bseg{display:flex;align-items:center;gap:5px;padding:0 7px;border-left:1px solid var(--line);flex:0 0 auto;}
.bseg:first-of-type{border-left:none;}
.bseg label{font-size:8.5px;font-weight:800;color:var(--ink-faint);letter-spacing:.08em;text-transform:uppercase;}
.bseg input[type=text]{width:104px;border:none;background:none;font-size:12px;font-weight:700;font-family:var(--fh);color:var(--ink);}
.bseg input[type=number]{width:40px;border:1px solid var(--line);border-radius:7px;padding:4px 4px;font-family:var(--fm);font-size:11px;background:#FBF7EE;color:var(--ink);}
.bseg select{border:1px solid var(--line);border-radius:7px;padding:4px 4px;font-size:10.5px;font-weight:600;background:#FBF7EE;color:var(--ink);}
.bseg input:focus,.bseg select:focus{outline:2px solid var(--orange-dim);}
.ring{position:relative;width:34px;height:34px;flex:0 0 auto;}
.ring svg{transform:rotate(-90deg);}
.ring .v{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--fh);font-weight:800;font-size:10.5px;}

/* ============ zoom controls ============ */
.zoomer{position:fixed;right:14px;bottom:96px;display:flex;flex-direction:column;gap:5px;z-index:40;}
.zbtn{width:36px;height:36px;border-radius:11px;border:1px solid var(--line);background:rgba(255,255,255,.94);backdrop-filter:blur(10px);
  color:var(--ink);font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(58,46,34,.12);transition:all .15s;}
.zbtn:hover{border-color:var(--orange);color:var(--orange-dark);}
.zbtn:active{transform:scale(.9);}

/* ============ bottom dock ============ */
.dock{position:fixed;left:50%;transform:translateX(-50%);bottom:12px;z-index:40;
  background:rgba(255,255,255,.94);backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:18px;
  padding:8px;box-shadow:0 12px 40px rgba(58,46,34,.16);max-width:calc(100vw - 24px);}
.dock .chips{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;}
.dock .chips::-webkit-scrollbar{display:none;}
.chip{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:3px;background:#FBF7EE;border:1.5px solid transparent;
  border-radius:12px;padding:7px 11px;cursor:pointer;transition:all .15s;min-width:58px;}
.chip:hover{border-color:var(--orange);background:#FFF;}
.chip:active{transform:scale(.9);}
.chip .e{font-size:17px;line-height:1;}
.chip span{font-size:8.5px;font-weight:700;font-family:var(--fh);color:var(--ink);white-space:nowrap;}

/* ============ floating selection card ============ */
.sel{position:fixed;right:14px;top:64px;width:246px;max-height:calc(100vh - 180px);overflow-y:auto;z-index:45;
  background:rgba(255,255,255,.96);backdrop-filter:blur(14px);border:1px solid var(--line);border-radius:18px;
  padding:14px;box-shadow:0 16px 50px rgba(58,46,34,.2);transform:translateX(280px);transition:transform .3s cubic-bezier(.22,1,.36,1);scrollbar-width:thin;}
.sel.open{transform:none;}
.sel h3{font-family:var(--fh);font-size:12.5px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.sel h3 .close{margin-left:auto;width:22px;height:22px;border-radius:7px;border:none;background:#F3ECDD;cursor:pointer;font-size:10px;font-weight:700;color:var(--ink-soft);}
.sel h3 .close:hover{background:var(--orange-dim);color:var(--orange-dark);}
.frow{display:flex;gap:6px;margin-bottom:8px;align-items:center;}
.frow label{font-size:8.5px;font-weight:800;color:var(--ink-faint);width:50px;flex:0 0 auto;text-transform:uppercase;letter-spacing:.06em;}
.frow input[type=number]{width:56px;border:1px solid var(--line);border-radius:7px;padding:5px;font-family:var(--fm);font-size:11px;background:#FBF7EE;}
.frow input[type=text]{flex:1;border:1px solid var(--line);border-radius:7px;padding:5px 7px;font-size:11px;font-weight:600;background:#FBF7EE;}
.btnrow{display:flex;gap:5px;flex-wrap:wrap;margin:2px 0 4px;}
.btn{border:1px solid var(--line);background:#FBF7EE;border-radius:9px;padding:6px 9px;font-size:9.5px;font-weight:700;cursor:pointer;font-family:var(--fb);color:var(--ink);transition:all .13s;}
.btn:hover{border-color:var(--orange);color:var(--orange-dark);}
.btn:active{transform:scale(.92);}
.btn.danger:hover{border-color:var(--danger);color:var(--danger);}
.openrow{display:flex;align-items:center;gap:4px;font-size:9.5px;background:#FBF7EE;border-radius:8px;padding:4px 6px;margin-top:4px;}
.openrow b{font-family:var(--fh);flex:1;font-size:9px;}
.openrow select{border:1px solid var(--line);border-radius:5px;font-size:8.5px;padding:2px;background:#fff;}
.openrow input[type=range]{width:44px;accent-color:var(--orange);}
.openrow button{border:none;background:none;cursor:pointer;font-size:8.5px;font-weight:700;color:var(--orange-dark);padding:2px 4px;border-radius:5px;}
.openrow button:hover{background:var(--orange-dim);}
.openrow button.del{color:var(--danger);}
.verd{border-top:1px dashed var(--line);margin-top:10px;padding-top:10px;}
.vbadge{display:inline-block;font-family:var(--fh);font-size:9.5px;font-weight:700;padding:5px 10px;border-radius:99px;margin-bottom:8px;}
.vbadge.good{background:#E7F3EC;color:var(--success);}
.vbadge.bad{background:#FBEAEA;color:var(--danger);}
.vbadge.mid{background:#FBF3DC;color:var(--amber);}
.confrow{display:flex;justify-content:space-between;font-size:8.5px;font-weight:700;color:var(--ink-soft);margin-bottom:3px;}
.cbar{height:5px;border-radius:99px;background:#F0E8D8;overflow:hidden;margin-bottom:7px;}
.cbar i{display:block;height:100%;background:linear-gradient(90deg,var(--orange),var(--orange-dark));border-radius:99px;transition:width .5s;}
.vnote{font-size:9px;line-height:1.55;background:#FBF7EE;border-left:2.5px solid var(--amber);border-radius:7px;padding:7px 9px;margin-bottom:6px;color:var(--ink);}
.vrem{font-size:9px;line-height:1.55;background:var(--orange-dim);border-radius:7px;padding:7px 9px;}
.vrem b{color:var(--orange-dark);font-family:var(--fh);font-size:7.5px;letter-spacing:.1em;display:block;margin-bottom:1px;}

.hint{position:fixed;left:14px;bottom:96px;z-index:38;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);
  border:1px solid var(--line);border-radius:13px;padding:9px 12px;font-size:10px;color:var(--ink-soft);line-height:1.6;max-width:190px;box-shadow:0 8px 24px rgba(58,46,34,.12);}
.hint b{color:var(--ink);}
.hint .close{float:right;border:none;background:none;cursor:pointer;font-weight:700;color:var(--ink-faint);margin-left:6px;}

.toast{position:fixed;top:58px;left:50%;transform:translateX(-50%) translateY(-90px);background:var(--ink);color:#fff;font-size:11.5px;font-weight:700;padding:9px 16px;border-radius:99px;z-index:99;transition:transform .32s cubic-bezier(.22,1,.36,1);box-shadow:0 12px 34px rgba(0,0,0,.3);}
.toast.show{transform:translateX(-50%) translateY(0);}
@media(max-width:760px){
  .bseg.hideS{display:none;}
  .sel{width:calc(100vw - 28px);right:14px;}
}
</style>
</head>
<body>

<svg id="cv"></svg>

<div class="bar">
  <div class="logo">VG</div>
  <div class="bseg"><input type="text" id="projName" value="Amb Niwas — GF"></div>
  <div class="bseg"><label>Plot</label>
    <input type="number" id="plotW" value="48" min="15" max="120"><span style="font-size:10px;color:var(--ink-faint)">×</span>
    <input type="number" id="plotH" value="50" min="15" max="120"><span style="font-size:9px;color:var(--ink-faint)">ft</span></div>
  <div class="bseg"><label>North</label>
    <select id="northDir"><option value="up">↑</option><option value="down" selected>↓</option><option value="left">←</option><option value="right">→</option></select></div>
  <div class="bseg hideS"><label>Wall</label>
    <select id="outerWall"><option value="0.75">9"</option><option value="1">12"</option><option value="0.5">6"</option></select>
    <select id="innerWall"><option value="0.33">4"</option><option value="0.5">6"</option><option value="0.75">9"</option></select></div>
  <div class="bseg hideS"><label>Grid</label><select id="showGrid"><option value="1">On</option><option value="0">Off</option></select></div>
  <div class="bseg">
    <div class="ring">
      <svg width="34" height="34" viewBox="0 0 34 34">
        <circle cx="17" cy="17" r="13.5" fill="none" stroke="#F0E8D8" stroke-width="3.5"/>
        <circle id="ringFill" cx="17" cy="17" r="13.5" fill="none" stroke="#E08A3C" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="84.8" stroke-dashoffset="84.8" style="transition:stroke-dashoffset .7s cubic-bezier(.22,1,.36,1), stroke .4s;"/>
      </svg>
      <div class="v" id="scoreVal">—</div>
    </div>
  </div>
</div>

<div class="zoomer">
  <button class="zbtn" id="zIn">+</button>
  <button class="zbtn" id="zOut">−</button>
  <button class="zbtn" id="zFit" title="Fit" style="font-size:12px">⌂</button>
</div>

<div class="hint" id="hint"><button class="close" onclick="this.parentElement.remove()">✕</button>
  <b>Drag</b> kamra = move · <b>corner dot</b> = resize<br><b>Khali jagah drag</b> = pan · <b>scroll</b> = zoom<br>Neeche dock se naye kamre jodein.</div>

<div class="dock"><div class="chips" id="chips"></div></div>

<div class="sel" id="selCard"></div>

<div class="toast" id="toast"></div>

<script>
/* ================= KB ================= */
const DEITY={NW:'Vayu',N:'Kubera',NE:'Ishan',W:'Varuna',C:'Brahma',E:'Indra',SW:'Pitru',S:'Yama',SE:'Agni'};
const KB={
 bedroom:{nm:'Bedroom',ic:'🛏️',fill:'#E7EDE4',best:['SW'],ok:['S','W','NW'],avoid:['NE','SE'],conf:{SW:[93,74],S:[80,62],W:[78,60],NW:[70,54],NE:[91,70],SE:[84,58]},note:'Jagah (SW) par sources lagbhag ek-mat; <b>asar</b> par raay bati hui hai.',rem:'SW na mile to sirhana South wall se lagayein.'},
 kitchen:{nm:'Rasoi',ic:'🍳',fill:'#F6E3CE',best:['SE'],ok:['NW'],avoid:['NE','N','C'],conf:{SE:[92,81],NW:[74,55],NE:[94,79],N:[82,60],C:[90,76]},note:'SE (Agni) par near-universal consensus. NW par raay bati hui.',rem:'SE na ho to pakate waqt mooh East ki taraf.'},
 pooja:{nm:'Pooja',ic:'🪔',fill:'#F9EFD4',best:['NE'],ok:['N','E'],avoid:['S','SW'],conf:{NE:[96,86],N:[85,70],E:[84,69],S:[92,78],SW:[90,75]},note:'Ishan (NE) — Vastu ka sabse strong consensus.',rem:'NE na ho: N/E mein, murti ka mukh West.'},
 toilet:{nm:'Toilet',ic:'🚽',fill:'#DFE8ED',best:['NW'],ok:['W','S'],avoid:['NE','C','SW'],conf:{NW:[86,68],W:[76,58],S:[70,52],NE:[95,82],C:[93,80],SW:[81,63]},note:'"Kahan NAHI" par zyada consensus (NE/center kabhi nahi).',rem:'Galat zone: darwaza band + salt bowl; asli fix relocation.'},
 bath:{nm:'Bathroom',ic:'🛁',fill:'#DFE8ED',best:['NW','E'],ok:['W'],avoid:['NE','SW','C'],conf:{NW:[82,64],E:[78,60],W:[72,55],NE:[90,74],SW:[80,62],C:[88,72]},note:'Bathing (bina WC) ke liye East bhi accepted.',rem:'Drain ka dhaal North/East ki taraf.'},
 living:{nm:'Living',ic:'🛋️',fill:'#F2ECDD',best:['N','NE','E'],ok:['NW','C'],avoid:['SW'],conf:{N:[82,64],NE:[80,62],E:[81,63],NW:[70,52],C:[66,50],SW:[72,55]},note:'Flexible — N/E side par halki preference.',rem:'Bhaari furniture S/W walls par, NE khula.'},
 dining:{nm:'Dining',ic:'🍽️',fill:'#EFE7D4',best:['W'],ok:['E','S'],avoid:[],conf:{W:[74,56],E:[70,52],S:[68,50]},note:'Sources yahan sabse kam sehmat — halki West preference.',rem:'Khaate waqt mooh East/North.'},
 store:{nm:'Store',ic:'📦',fill:'#EAE4DA',best:['SW','W'],ok:['S','NW'],avoid:['NE','C'],conf:{SW:[84,66],W:[80,62],S:[74,56],NW:[70,52],NE:[88,72],C:[90,76]},note:'Bhaari saman = bhaari zone. Accha consensus.',rem:'NE mein sirf halka saman.'},
 study:{nm:'Study',ic:'📚',fill:'#E7EAF2',best:['NE','E','N'],ok:['W'],avoid:['SW'],conf:{NE:[83,66],E:[82,65],N:[80,63],W:[68,50],SW:[70,54]},note:'Modern sources zyada sehmat; classical mein kam zikr.',rem:'Mooh East/North, peeth wall se.'},
 guest:{nm:'Guest',ic:'🚪',fill:'#E7EDE4',best:['NW'],ok:['N','W'],avoid:['SW'],conf:{NW:[85,68],N:[74,56],W:[72,55],SW:[78,60]},note:'NW (Vayu — movement) guest ke liye classic.',rem:'SW guest ko nahi — wo mukhiya ka zone hai.'},
 utility:{nm:'Utility',ic:'🧺',fill:'#ECE8E0',best:['NW','SE'],ok:['W'],avoid:['NE'],conf:{NW:[72,54],SE:[70,52],W:[66,50],NE:[80,62]},note:'Kam-researched — NW/SE dono mile-jule.',rem:'Machines NE se door.'},
 stairs:{nm:'Stairs',ic:'🪜',fill:'#E8E1D4',best:['SW','S','W'],ok:['SE'],avoid:['NE','C'],conf:{SW:[86,68],S:[80,62],W:[78,60],SE:[68,52],NE:[92,76],C:[94,80]},note:'NE/Brahmasthan mein seedhi par strong "nahi".',rem:'Clockwise chadhna shubh.'},
};
const ZG={
 up:[['NW','N','NE'],['W','C','E'],['SW','S','SE']],
 down:[['SE','S','SW'],['E','C','W'],['NE','N','NW']],
 left:[['NE','E','SE'],['N','C','S'],['NW','W','SW']],
 right:[['SW','W','NW'],['S','C','N'],['SE','E','NE']],
};

/* ================= state ================= */
let plotW=48, plotH=50, northDir='down', outerT=0.75, innerT=0.33, showGrid=true;
let rooms=[], selId=null, nextN={};
const FT=14;                       /* world px per ft (fixed) */
let vb={x:0,y:0,w:1000,h:700};     /* viewBox = camera */
const cv=document.getElementById('cv');
const NS='http://www.w3.org/2000/svg';
function el(t,at,parent){const e=document.createElementNS(NS,t);for(const k in at)e.setAttribute(k,at[k]);(parent||cv).appendChild(e);return e;}

const worldW=()=>plotW*FT+300, worldH=()=>plotH*FT+140;
function fit(){
  const vw=innerWidth,vh=innerHeight;
  const m=1.06;
  const ww=worldW()*m, wh=worldH()*m;
  const ar=vw/vh, war=ww/wh;
  if(war>ar){vb.w=ww;vb.h=ww/ar;}else{vb.h=wh;vb.w=wh*ar;}
  vb.x=-(vb.w-worldW())/2 - 40; vb.y=-(vb.h-worldH())/2 - 30;
  applyVB();
}
function applyVB(){cv.setAttribute('viewBox',`${vb.x} ${vb.y} ${vb.w} ${vb.h}`);}

function zoneOf(r){
  const cx=(r.x+r.w/2)/plotW, cy=(r.y+r.h/2)/plotH;
  const c=Math.min(2,Math.floor(cx*3)), ro=Math.min(2,Math.floor(cy*3));
  return ZG[northDir][ro][c];
}
function vOf(r){const k=KB[r.key],z=zoneOf(r);return k.best.includes(z)?'good':k.avoid.includes(z)?'bad':'mid';}
const VC={good:'#3D8B5F',bad:'#C24545',mid:'#C08A1E'};

/* ================= render (world coords, camera separate) ================= */
function render(){
  cv.innerHTML='';
  const s=FT, W=plotW*s, H=plotH*s;

  const defs=el('defs',{});
  const sh=el('filter',{id:'paperSh',x:'-10%',y:'-10%',width:'120%',height:'124%'},defs);
  el('feDropShadow',{dx:0,dy:10,stdDeviation:16,['flood-color']:'#8A7250',['flood-opacity']:.35},sh);
  const pat=el('pattern',{id:'gr',width:20,height:20,patternUnits:'userSpaceOnUse'},defs);
  el('rect',{width:20,height:20,fill:'#FCF8F0'},pat);
  el('circle',{cx:1,cy:1,r:.7,fill:'#E6DCC6'},pat);

  /* paper */
  el('rect',{x:-34,y:-34,width:W+34*2+150,height:H+68,rx:12,fill:'#FCF8F0',filter:'url(#paperSh)'});

  const g=el('g',{});

  el('rect',{x:0,y:0,width:W,height:H,fill:'url(#gr)'},g);

  if(showGrid){
    for(let i=1;i<3;i++){
      el('line',{x1:W*i/3,y1:0,x2:W*i/3,y2:H,stroke:'#D97B26',['stroke-opacity']:.2,['stroke-dasharray']:'6 5',['stroke-width']:1.1},g);
      el('line',{x1:0,y1:H*i/3,x2:W,y2:H*i/3,stroke:'#D97B26',['stroke-opacity']:.2,['stroke-dasharray']:'6 5',['stroke-width']:1.1},g);
    }
    for(let r=0;r<3;r++)for(let c=0;c<3;c++){
      el('text',{x:W*(c+.5)/3,y:H*(r+.5)/3+5,['text-anchor']:'middle',fill:'#D97B26',['fill-opacity']:.16,style:'font-family:Poppins;font-weight:800;font-size:14px;letter-spacing:.12em'},g).textContent=ZG[northDir][r][c];
    }
    el('rect',{x:W/3,y:H/3,width:W/3,height:H/3,fill:'none',stroke:'#D97B26',['stroke-opacity']:.34,['stroke-dasharray']:'5 4',rx:7},g);
  }

  rooms.forEach(r=>{
    const it=Math.max(2.5,innerT*s);
    const x=r.x*s,y=r.y*s,w=r.w*s,h=r.h*s;
    const k=KB[r.key];
    const grp=el('g',{class:'roomg','data-id':r.id,style:'cursor:grab'},g);
    el('rect',{x,y,width:w,height:h,fill:k.fill},grp);
    el('rect',{x:x+it/2,y:y+it/2,width:Math.max(0,w-it),height:Math.max(0,h*0.32),fill:'#FFFFFF',['fill-opacity']:.28},grp);
    el('rect',{x,y,width:w,height:h,fill:'none',stroke:'#2B2013',['stroke-width']:it},grp);

    r.doors.forEach(d=>drawDoor(grp,r,d,s,it,k.fill));
    r.wins.forEach(wd=>drawWin(grp,r,wd,s,it));

    /* scale-aware labels — never overflow small rooms */
    const mm=Math.min(w,h);
    const z=zoneOf(r), v=vOf(r);
    const nameFS=Math.max(8,Math.min(14,mm*0.14));
    if(mm>=34){
      el('text',{x:x+w/2,y:y+h/2-(mm>=64?6:0),['text-anchor']:'middle',style:`font-family:Poppins;font-weight:700;font-size:${nameFS}px`,fill:'#2E241A'},grp).textContent=r.nm;
    }
    if(mm>=64){
      el('text',{x:x+w/2,y:y+h/2+11,['text-anchor']:'middle',style:'font-family:DM Mono;font-size:9.5px',fill:'#7A6B52'},grp).textContent=`${r.w}'×${r.h}'`;
      const cw=58;
      el('rect',{x:x+w/2-cw/2,y:y+h/2+17,width:cw,height:14,rx:7,fill:VC[v],['fill-opacity']:.13},grp);
      el('circle',{cx:x+w/2-cw/2+8,cy:y+h/2+24,r:2.6,fill:VC[v]},grp);
      el('text',{x:x+w/2-cw/2+14,y:y+h/2+27.4,style:'font-family:Inter;font-weight:800;font-size:7.5px;letter-spacing:.03em',fill:VC[v]},grp).textContent=z+' '+(v==='good'?'SAHI':v==='bad'?'BACHEIN':'THEEK');
    }else if(mm>=34){
      el('circle',{cx:x+w-8,cy:y+8,r:4,fill:VC[v],stroke:'#fff',['stroke-width']:1.4},grp);
    }else{
      el('circle',{cx:x+w/2,cy:y+h/2,r:4.4,fill:VC[v],stroke:'#fff',['stroke-width']:1.5},grp);
    }

    if(r.id===selId){
      el('rect',{x:x-4,y:y-4,width:w+8,height:h+8,fill:'none',stroke:'#E08A3C',['stroke-width']:2,['stroke-dasharray']:'7 5',rx:5},grp);
      el('circle',{cx:x+w,cy:y+h,r:8,fill:'#E08A3C',stroke:'#FCF8F0',['stroke-width']:3,class:'rsz','data-id':r.id,style:'cursor:nwse-resize'},grp);
    }
  });

  const ot=Math.max(3.5,outerT*s);
  el('rect',{x:-ot/2,y:-ot/2,width:W+ot,height:H+ot,fill:'none',stroke:'#2B2013',['stroke-width']:ot},g);

  dim(g,0,-ot-14,W,-ot-14,`${plotW}'-0"`,'h');
  dim(g,-ot-14,0,-ot-14,H,`${plotH}'-0"`,'v');

  /* compass + title block on paper's right margin */
  const rot={up:0,right:90,down:180,left:270}[northDir];
  const compG=el('g',{transform:`translate(${W+80},${26})`},g);
  el('circle',{cx:0,cy:0,r:22,fill:'#FFF',stroke:'#2B2013',['stroke-width']:1.5},compG);
  el('circle',{cx:0,cy:0,r:17,fill:'none',stroke:'#2B2013',['stroke-width']:.5,['stroke-dasharray']:'2 3'},compG);
  const cg=el('g',{transform:`rotate(${rot})`},compG);
  el('path',{d:'M0,-15 L5,4.5 L0,1.5 L-5,4.5 Z',fill:'#C24545'},cg);
  el('path',{d:'M0,15 L5,-4.5 L0,-1.5 L-5,-4.5 Z',fill:'#2B2013',['fill-opacity']:.28},cg);
  el('text',{x:0,y:-27,['text-anchor']:'middle',style:'font-family:Poppins;font-weight:800;font-size:11px',fill:'#C24545',transform:`rotate(${-rot} 0 -27)`},cg).textContent='N';

  const tb=el('g',{transform:`translate(${W+22},${H-88})`},g);
  el('rect',{x:0,y:0,width:116,height:88,fill:'#FFF',stroke:'#2B2013',['stroke-width']:1.2},tb);
  el('line',{x1:0,y1:25,x2:116,y2:25,stroke:'#2B2013',['stroke-width']:1},tb);
  el('line',{x1:0,y1:48,x2:116,y2:48,stroke:'#2B2013',['stroke-width']:.5},tb);
  el('line',{x1:0,y1:68,x2:116,y2:68,stroke:'#2B2013',['stroke-width']:.5},tb);
  el('text',{x:58,y:16,['text-anchor']:'middle',style:'font-family:Poppins;font-weight:700;font-size:8.5px',fill:'#2B2013'},tb).textContent=document.getElementById('projName').value.toUpperCase().slice(0,22);
  el('text',{x:6,y:40,style:'font-family:DM Mono;font-size:7px',fill:'#7A6B52'},tb).textContent='FLOOR PLAN — GROUND';
  el('text',{x:6,y:61,style:'font-family:DM Mono;font-size:7px',fill:'#7A6B52'},tb).textContent='SCALE: NTS · DIMS FT';
  el('text',{x:6,y:81,style:'font-family:DM Mono;font-size:7px',fill:'#7A6B52'},tb).textContent='VASTU GRIHA · '+new Date().toLocaleDateString('en-IN');

  applyVB(); wire(); updateScore();
}

function drawDoor(grp,r,d,s,it,fill){
  const dw=d.w*s;
  const [px,py,horiz]=sidePoint(r,d.side,d.t,s,dw);
  el('rect',horiz?{x:px,y:py-it/2-1,width:dw,height:it+2,fill}:{x:px-it/2-1,y:py,width:it+2,height:dw,fill},grp);
  if(horiz){
    const dirY=d.side==='top'?1:-1;
    const hx=d.flip?px+dw:px, ex=hx, ey=py+dirY*dw;
    el('line',{x1:hx,y1:py,x2:ex,y2:ey,stroke:'#2B2013',['stroke-width']:2},grp);
    const sweep=(dirY===1)===(!d.flip)?1:0;
    el('path',{d:`M ${d.flip?px:px+dw} ${py} A ${dw} ${dw} 0 0 ${sweep} ${ex} ${ey}`,fill:'none',stroke:'#8A7A5C',['stroke-width']:1,['stroke-dasharray']:'3 3'},grp);
  }else{
    const dirX=d.side==='left'?1:-1;
    const hy=d.flip?py+dw:py, ex=px+dirX*dw, ey=hy;
    el('line',{x1:px,y1:hy,x2:ex,y2:ey,stroke:'#2B2013',['stroke-width']:2},grp);
    const sweep=(dirX===1)===(!!d.flip)?1:0;
    el('path',{d:`M ${px} ${d.flip?py:py+dw} A ${dw} ${dw} 0 0 ${sweep} ${ex} ${ey}`,fill:'none',stroke:'#8A7A5C',['stroke-width']:1,['stroke-dasharray']:'3 3'},grp);
  }
}
function drawWin(grp,r,wd,s,it){
  const ww=wd.w*s;
  const [px,py,horiz]=sidePoint(r,wd.side,wd.t,s,ww);
  if(horiz){
    el('rect',{x:px,y:py-it/2-1,width:ww,height:it+2,fill:'#FFF'},grp);
    [-it/2,0,it/2].forEach(o=>el('line',{x1:px,y1:py+o,x2:px+ww,y2:py+o,stroke:'#2B2013',['stroke-width']:1},grp));
  }else{
    el('rect',{x:px-it/2-1,y:py,width:it+2,height:ww,fill:'#FFF'},grp);
    [-it/2,0,it/2].forEach(o=>el('line',{x1:px+o,y1:py,x2:px+o,y2:py+ww,stroke:'#2B2013',['stroke-width']:1},grp));
  }
}
function sidePoint(r,side,t,s,len){
  const x=r.x*s,y=r.y*s,w=r.w*s,h=r.h*s;
  if(side==='top')return[x+(w-len)*t,y,true];
  if(side==='bottom')return[x+(w-len)*t,y+h,true];
  if(side==='left')return[x,y+(h-len)*t,false];
  return[x+w,y+(h-len)*t,false];
}
function dim(g,x1,y1,x2,y2,txt,ax){
  el('line',{x1,y1,x2,y2,stroke:'#9A8A6C',['stroke-width']:1},g);
  const tick=(x,y)=>el('line',{x1:x-4,y1:y+4,x2:x+4,y2:y-4,stroke:'#9A8A6C',['stroke-width']:1.1},g);
  tick(x1,y1);tick(x2,y2);
  if(ax==='h')el('text',{x:(x1+x2)/2,y:y1-6,['text-anchor']:'middle',style:'font-family:DM Mono;font-size:11px',fill:'#4A3D2A'},g).textContent=txt;
  else el('text',{x:x1-8,y:(y1+y2)/2,['text-anchor']:'middle',style:'font-family:DM Mono;font-size:11px',fill:'#4A3D2A',transform:`rotate(-90 ${x1-8} ${(y1+y2)/2})`},g).textContent=txt;
}

/* ================= camera + interactions ================= */
let drag=null;
function wire(){
  cv.querySelectorAll('.roomg').forEach(gr=>{
    gr.addEventListener('pointerdown',e=>{
      if(e.target.classList.contains('rsz'))return;
      const id=gr.dataset.id;select(id);
      const r=rooms.find(r=>r.id===id);const p=wpt(e);
      drag={type:'move',id,ox:r.x,oy:r.y,px:p.x,py:p.y};
      e.stopPropagation();e.preventDefault();
    });
  });
  cv.querySelectorAll('.rsz').forEach(hd=>{
    hd.addEventListener('pointerdown',e=>{
      const id=hd.dataset.id;const r=rooms.find(r=>r.id===id);const p=wpt(e);
      drag={type:'size',id,ow:r.w,oh:r.h,px:p.x,py:p.y};
      e.stopPropagation();e.preventDefault();
    });
  });
}
cv.addEventListener('pointerdown',e=>{ /* pan on empty */
  const p=wpt(e);
  drag={type:'pan',px:e.clientX,py:e.clientY,vx:vb.x,vy:vb.y};
  cv.classList.add('panning');
});
window.addEventListener('pointermove',e=>{
  if(!drag)return;
  if(drag.type==='pan'){
    const k=vb.w/innerWidth;
    vb.x=drag.vx-(e.clientX-drag.px)*k;
    vb.y=drag.vy-(e.clientY-drag.py)*k;
    applyVB();return;
  }
  const p=wpt(e), s=FT;
  const r=rooms.find(r=>r.id===drag.id);
  if(drag.type==='move'){
    r.x=clamp(Math.round((drag.ox+(p.x-drag.px)/s)*2)/2,0,plotW-r.w);
    r.y=clamp(Math.round((drag.oy+(p.y-drag.py)/s)*2)/2,0,plotH-r.h);
  }else{
    r.w=clamp(Math.round((drag.ow+(p.x-drag.px)/s)*2)/2,3,plotW-r.x);
    r.h=clamp(Math.round((drag.oh+(p.y-drag.py)/s)*2)/2,3,plotH-r.y);
  }
  render();selPanel();
});
window.addEventListener('pointerup',()=>{drag=null;cv.classList.remove('panning');});
cv.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY>0?1.1:1/1.1;
  const p=wpt(e);
  const nw=clamp(vb.w*f,worldW()*0.18,worldW()*4);
  const k=nw/vb.w;
  vb.x=p.x-(p.x-vb.x)*k; vb.y=p.y-(p.y-vb.y)*k;
  vb.w=nw; vb.h*=k;
  applyVB();
},{passive:false});
function wpt(e){
  const pt=cv.createSVGPoint();pt.x=e.clientX;pt.y=e.clientY;
  return pt.matrixTransform(cv.getScreenCTM().inverse());
}
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

/* ================= rooms ================= */
function freeSpot(w,h){
  for(let y=1;y<=plotH-h;y+=1)for(let x=1;x<=plotW-w;x+=1){
    const hit=rooms.some(r=>x<r.x+r.w+1&&x+w+1>r.x&&y<r.y+r.h+1&&y+h+1>r.y);
    if(!hit)return{x,y};
  }
  return{x:1,y:1};
}
function addRoom(key){
  nextN[key]=(nextN[key]||0)+1;const n=nextN[key];const k=KB[key];
  const w=Math.min(12,plotW-2),h=Math.min(10,plotH-2);
  const sp=freeSpot(w,h);
  const id='r'+Date.now()+Math.random().toString(36).slice(2,5);
  rooms.push({id,key,nm:k.nm+(n>1?' '+n:''),x:sp.x,y:sp.y,w,h,doors:[{side:'bottom',t:.5,w:3,flip:false}],wins:[]});
  select(id);toast(k.nm+(n>1?' '+n:'')+' add ho gaya');
}
function select(id){selId=id;render();selPanel();}
function selPanel(){
  const card=document.getElementById('selCard');
  const r=rooms.find(r=>r.id===selId);
  if(!r){card.classList.remove('open');return;}
  const k=KB[r.key],z=zoneOf(r),v=vOf(r),conf=k.conf[z]||[65,50];
  const badge=v==='good'?`<span class="vbadge good">✓ ${z} (${DEITY[z]}) — SAHI zone</span>`
    :v==='bad'?`<span class="vbadge bad">✕ ${z} (${DEITY[z]}) — BACHEIN</span>`
    :`<span class="vbadge mid">◐ ${z} (${DEITY[z]}) — mila-jula</span>`;
  card.classList.add('open');
  card.innerHTML=`<h3>${k.ic} ${r.nm}<button class="close" id="selClose">✕</button></h3>
    <div class="frow"><label>Naam</label><input type="text" id="rNm" value="${r.nm}"></div>
    <div class="frow"><label>Size ft</label>
      <input type="number" id="rW" value="${r.w}" min="3" step="0.5"> <span style="color:var(--ink-faint);font-size:10px">×</span>
      <input type="number" id="rH" value="${r.h}" min="3" step="0.5"></div>
    <div class="btnrow">
      <button class="btn" id="rRot">⟳ Rotate</button>
      <button class="btn" id="rDoor">+ Door</button>
      <button class="btn" id="rWin">+ Window</button>
      <button class="btn danger" id="rDel">Delete</button>
    </div>
    <div id="opList"></div>
    <div class="verd">${badge}
      <div class="confrow"><span>Jagah par consensus</span><b>${conf[0]}%</b></div>
      <div class="cbar"><i style="width:${conf[0]}%"></i></div>
      <div class="confrow"><span>Asar par consensus</span><b>${conf[1]}%</b></div>
      <div class="cbar"><i style="width:${conf[1]}%"></i></div>
      <div class="vnote">${k.note}</div>
      <div class="vrem"><b>UPAAY</b>${k.rem}</div>
    </div>`;
  document.getElementById('selClose').onclick=()=>{selId=null;render();selPanel();};
  document.getElementById('rNm').onchange=e=>{r.nm=e.target.value;render();};
  document.getElementById('rW').onchange=e=>{r.w=clamp(+e.target.value,3,plotW-r.x);render();selPanel();};
  document.getElementById('rH').onchange=e=>{r.h=clamp(+e.target.value,3,plotH-r.y);render();selPanel();};
  document.getElementById('rRot').onclick=()=>{const t=r.w;r.w=clamp(r.h,3,plotW-r.x);r.h=clamp(t,3,plotH-r.y);render();selPanel();};
  document.getElementById('rDel').onclick=()=>{rooms=rooms.filter(q=>q.id!==r.id);selId=null;render();selPanel();};
  document.getElementById('rDoor').onclick=()=>{r.doors.push({side:'bottom',t:.5,w:3,flip:false});render();selPanel();};
  document.getElementById('rWin').onclick=()=>{r.wins.push({side:'top',t:.5,w:4});render();selPanel();};
  const op=document.getElementById('opList');
  r.doors.forEach((d,i)=>{
    const row=document.createElement('div');row.className='openrow';
    row.innerHTML=`<b>🚪D${i+1}</b>
      <select data-i="${i}" class="dside"><option ${d.side==='top'?'selected':''}>top</option><option ${d.side==='bottom'?'selected':''}>bottom</option><option ${d.side==='left'?'selected':''}>left</option><option ${d.side==='right'?'selected':''}>right</option></select>
      <input type="range" class="dpos" data-i="${i}" min="0" max="1" step="0.05" value="${d.t}">
      <button class="dflip" data-i="${i}">⇄</button><button class="del ddel" data-i="${i}">✕</button>`;
    op.appendChild(row);
  });
  r.wins.forEach((wd,i)=>{
    const row=document.createElement('div');row.className='openrow';
    row.innerHTML=`<b>🪟W${i+1}</b>
      <select data-i="${i}" class="wside"><option ${wd.side==='top'?'selected':''}>top</option><option ${wd.side==='bottom'?'selected':''}>bottom</option><option ${wd.side==='left'?'selected':''}>left</option><option ${wd.side==='right'?'selected':''}>right</option></select>
      <input type="range" class="wpos" data-i="${i}" min="0" max="1" step="0.05" value="${wd.t}">
      <button class="del wdel" data-i="${i}">✕</button>`;
    op.appendChild(row);
  });
  op.querySelectorAll('.dside').forEach(sl=>sl.onchange=e=>{r.doors[+e.target.dataset.i].side=e.target.value;render();});
  op.querySelectorAll('.dpos').forEach(sl=>sl.oninput=e=>{r.doors[+e.target.dataset.i].t=+e.target.value;render();});
  op.querySelectorAll('.dflip').forEach(b=>b.onclick=e=>{const d=r.doors[+e.target.dataset.i];d.flip=!d.flip;render();});
  op.querySelectorAll('.ddel').forEach(b=>b.onclick=e=>{r.doors.splice(+e.target.dataset.i,1);render();selPanel();});
  op.querySelectorAll('.wside').forEach(sl=>sl.onchange=e=>{r.wins[+e.target.dataset.i].side=e.target.value;render();});
  op.querySelectorAll('.wpos').forEach(sl=>sl.oninput=e=>{r.wins[+e.target.dataset.i].t=+e.target.value;render();});
  op.querySelectorAll('.wdel').forEach(b=>b.onclick=e=>{r.wins.splice(+e.target.dataset.i,1);render();selPanel();});
}

/* ================= score ================= */
function updateScore(){
  const ring=document.getElementById('ringFill'),val=document.getElementById('scoreVal');
  if(!rooms.length){ring.style.strokeDashoffset=84.8;val.textContent='—';return;}
  let s=0;rooms.forEach(r=>{const v=vOf(r);s+=v==='good'?100:v==='mid'?62:18;});
  const sc=Math.round(s/rooms.length),C=84.8;
  ring.style.strokeDashoffset=C-(C*sc/100);
  ring.style.stroke=sc>=75?'#3D8B5F':sc>=45?'#C08A1E':'#C24545';
  val.textContent=sc;
}

/* ================= chips + toolbar ================= */
const chipsEl=document.getElementById('chips');
Object.entries(KB).forEach(([key,k])=>{
  const c=document.createElement('div');c.className='chip';
  c.innerHTML=`<span class="e">${k.ic}</span><span>${k.nm}</span>`;
  c.onclick=()=>addRoom(key);chipsEl.appendChild(c);
});
document.getElementById('plotW').onchange=e=>{plotW=clamp(+e.target.value,15,120);rooms.forEach(r=>{r.w=Math.min(r.w,plotW);r.x=clamp(r.x,0,plotW-r.w);});render();fit();};
document.getElementById('plotH').onchange=e=>{plotH=clamp(+e.target.value,15,120);rooms.forEach(r=>{r.h=Math.min(r.h,plotH);r.y=clamp(r.y,0,plotH-r.h);});render();fit();};
document.getElementById('northDir').onchange=e=>{northDir=e.target.value;render();selPanel();toast('North badla — verdicts recalc');};
document.getElementById('outerWall').onchange=e=>{outerT=+e.target.value;render();};
document.getElementById('innerWall').onchange=e=>{innerT=+e.target.value;render();};
document.getElementById('showGrid').onchange=e=>{showGrid=e.target.value==='1';render();};
document.getElementById('projName').onchange=()=>render();
document.getElementById('zIn').onclick=()=>{const p={x:vb.x+vb.w/2,y:vb.y+vb.h/2};const k=1/1.2;vb.x=p.x-(p.x-vb.x)*k;vb.y=p.y-(p.y-vb.y)*k;vb.w*=k;vb.h*=k;applyVB();};
document.getElementById('zOut').onclick=()=>{const p={x:vb.x+vb.w/2,y:vb.y+vb.h/2};const k=1.2;vb.x=p.x-(p.x-vb.x)*k;vb.y=p.y-(p.y-vb.y)*k;vb.w*=k;vb.h*=k;applyVB();};
document.getElementById('zFit').onclick=fit;
window.addEventListener('resize',fit);

let tt;function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2000);}

/* seed — Amb Niwas, N=down, NON-overlapping */
[['store',1,1,10,20],['bedroom',12.5,1,15,10],['toilet',29,1,3,3],['bath',33.5,1,5,6],['guest',1,23,10,10]].forEach(([k,x,y,w,h],i)=>{
  nextN[k]=(nextN[k]||0)+1;const n=nextN[k];
  rooms.push({id:'seed'+i,key:k,nm:KB[k].nm+(n>1?' '+n:''),x,y,w,h,doors:[{side:'bottom',t:.5,w:3,flip:false}],wins:[]});
});
render();fit();
</script>

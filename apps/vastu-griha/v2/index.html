<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Vastu Griha - AI House Planner</title>
    <!-- SEO and PWA Meta -->
    <meta name="description" content="Design and analyze your home layout with real-time Vastu compliance scores, visual guidelines, AI designer templates, and custom product recommendations." />
    <meta name="theme-color" content="#7c5cbf" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Vastu Griha locked-brand fonts (apps/vastu-griha/v2/src/components/vastu/VastuTopicCard.jsx only —
         see .claude/skills/vastu-griha-design). Scoped fix: added alongside the fonts above, not replacing
         them — a full app-wide font swap is a separate decision. -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Unregister service worker to bypass cache locks
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          for (let registration of registrations) {
            registration.unregister();
            console.log('Service Worker unregistered successfully');
          }
        });
      }
    </script>
  </body>
</html>
